<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Recommend Books</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>


        body{
            background-color: black;
            color: white;
        }

        .navbar{
            background-color: #00a65a;
            padding: 15px;
        }

        .navbar-brand{
            color: white !important;
            font-size: 30px;
            font-weight: bold;
        }

        .nav-link{
            color: white !important;
            margin-left: 20px;
        }
        .form-control{
            height: 50px;
            font-size: 18px;
        }

        .btn-warning{
            padding: 10px 25px;
            font-size: 18px;
        }
    </style>

</head>

<body>

    <!-- Navbar -->

    <nav class="navbar navbar-expand-lg">

        <div class="container-fluid">

            <a class="navbar-brand" href="/">
                My Book Recommender
            </a>

            <div class="d-flex">

                <a class="nav-link" href="/">Home</a>

                <a class="nav-link" href="/recommend">Recommend</a>

            </div>

        </div>

    </nav>

    <!-- Recommend Section -->

    <div class="container">

        <div class="row">

            <div class="col-md-12">

                <h1 class="mt-5 text-center">
                    Recommend Books
                </h1>

                <form action="/recommend_books" method="post">

                    <input type="text"
                           name="user_input"
                           class="form-control mt-3"
                           placeholder="Enter Book Name">

                    <input type="submit"
                           class="btn btn-lg btn-warning mt-3">

                </form>
                {% if error %}
<div class="alert alert-danger mt-4">
    {{ error }}
</div>
{% endif %}

{% if data %}

<div class="row mt-5">

{% for i in data %}

<div class="col-md-3 mt-4">

    <div class="card bg-dark text-white">

        <img src="{{ i[2] }}" class="card-img-top">

        <div class="card-body">

            <h5>{{ i[0] }}</h5>

            <p>{{ i[1] }}</p>

        </div>

    </div>

</div>

{% endfor %}

</div>

{% endif %}

            </div>

        </div>

    </div>

</body>
</html>
